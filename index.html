<!DOCTYPE html>
<html>
<head>
  <title>Inventory (Batch + Expiry)</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input, select, button {
      padding: 8px;
      margin: 5px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #0056b3;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    .expired {
      background-color: #ffcccc;
    }

    .soon {
      background-color: #fff3cd;
    }
  </style>
</head>

<body>

<h1>📦 Inventory System (Batch + Expiry)</h1>

<!-- ADD ITEM -->
<div class="card">
  <h3>Add Item</h3>
  <input id="itemName" placeholder="Item Name">
  <input id="category" placeholder="Category">
  <button onclick="addItem()">Add Item</button>
</div>

<!-- STOCK IN -->
<div class="card">
  <h3>Stock IN (New Batch)</h3>

  <select id="itemSelect"></select>
  <input id="batchNo" placeholder="Batch No">
  <input id="expiryDate" type="date">
  <input id="qtyIn" type="number" placeholder="Quantity">

  <button onclick="stockIn()">Add Batch</button>
</div>

<!-- STOCK OUT -->
<div class="card">
  <h3>Stock OUT (Auto FIFO)</h3>

  <select id="itemSelectOut"></select>
  <input id="qtyOut" type="number" placeholder="Quantity">

  <button onclick="stockOut()">Remove Stock</button>
</div>

<!-- INVENTORY -->
<div class="card">
  <h3>Inventory View</h3>
  <button onclick="loadInventory()">Refresh</button>

  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Batch</th>
        <th>Expiry</th>
        <th>Qty</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="inventoryTable"></tbody>
  </table>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://vqjoucscghcvneudywls.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxam91Y3NjZ2hjdm5ldWR5d2xzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTYzMjgsImV4cCI6MjA5MDQzMjMyOH0.lttMVg3alSreRBPkrmdLK07kKlGAu3W7MYtJypKDSLg"
);

// LOAD ITEMS INTO DROPDOWN
async function loadItems() {
  const { data } = await supabase.from("items").select("*");

  const selectIn = document.getElementById("itemSelect");
  const selectOut = document.getElementById("itemSelectOut");

  selectIn.innerHTML = "";
  selectOut.innerHTML = "";

  data.forEach(item => {
    let opt1 = document.createElement("option");
    opt1.value = item.id;
    opt1.text = item.item_name;

    let opt2 = opt1.cloneNode(true);

    selectIn.appendChild(opt1);
    selectOut.appendChild(opt2);
  });
}

// ADD ITEM
async function addItem() {
  const name = document.getElementById("itemName").value;
  const category = document.getElementById("category").value;

  await supabase.from("items").insert([
    { item_name: name, category: category }
  ]);

  alert("Item added");
  loadItems();
}

// STOCK IN
async function stockIn() {
  const itemId = document.getElementById("itemSelect").value;
  const batchNo = document.getElementById("batchNo").value;
  const expiry = document.getElementById("expiryDate").value;
  const qty = document.getElementById("qtyIn").value;

  const { data: batch } = await supabase
    .from("batches")
    .insert([
      {
        item_id: itemId,
        batch_no: batchNo,
        expiry_date: expiry,
        quantity: 0
      }
    ])
    .select()
    .single();

  await supabase.from("transactions").insert([
    {
      batch_id: batch.id,
      quantity: qty,
      type: "IN"
    }
  ]);

  alert("Stock IN successful");
  loadInventory();
}

// STOCK OUT (FIFO handled in backend)
async function stockOut() {
  const itemId = document.getElementById("itemSelectOut").value;
  const qty = document.getElementById("qtyOut").value;

  const { data } = await supabase
    .from("batches")
    .select("id")
    .eq("item_id", itemId)
    .limit(1);

  if (!data.length) {
    alert("No stock available");
    return;
  }

  const { error } = await supabase.from("transactions").insert([
    {
      batch_id: data[0].id,
      quantity: qty,
      type: "OUT"
    }
  ]);

  if (error) {
    alert(error.message);
  } else {
    alert("Stock OUT successful");
    loadInventory();
  }
}

// LOAD INVENTORY TABLE
async function loadInventory() {
  const { data } = await supabase.from("inventory_view").select("*");

  const table = document.getElementById("inventoryTable");
  table.innerHTML = "";

  data.forEach(row => {
    const tr = document.createElement("tr");

    if (row.status === "EXPIRED") {
      tr.classList.add("expired");
    } else if (row.status === "EXPIRING SOON") {
      tr.classList.add("soon");
    }

    tr.innerHTML = `
      <td>${row.item_name}</td>
      <td>${row.batch_no}</td>
      <td>${row.expiry_date}</td>
      <td>${row.quantity}</td>
      <td>${row.status}</td>
    `;

    table.appendChild(tr);
  });
}

// INITIAL LOAD
loadItems();
loadInventory();
</script>

</body>
</html>
