<!DOCTYPE html>
<html>
<head>
  <title>Inventory (Batch + Expiry)</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input, select, button {
      padding: 8px;
      margin: 5px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    .expired { background: #ffcccc; }
    .soon { background: #fff3cd; }
  </style>
</head>

<body>

<h1>📦 Inventory System (Batch + Expiry)</h1>

<!-- ADD ITEM -->
<div class="card">
  <h3>Add Item</h3>
  <input id="itemName" placeholder="Item Name">
  <input id="category" placeholder="Category">
  <button id="addItemBtn">Add Item</button>
</div>

<!-- STOCK IN -->
<div class="card">
  <h3>Stock IN</h3>
  <select id="itemSelect"></select>
  <input id="batchNo" placeholder="Batch No">
  <input id="expiryDate" type="date">
  <input id="qtyIn" type="number" placeholder="Quantity">
  <button id="stockInBtn">Add Batch</button>
</div>

<!-- STOCK OUT -->
<div class="card">
  <h3>Stock OUT</h3>
  <select id="itemSelectOut"></select>
  <input id="qtyOut" type="number" placeholder="Quantity">
  <button id="stockOutBtn">Remove Stock</button>
</div>

<!-- INVENTORY -->
<div class="card">
  <h3>Inventory</h3>
  <button id="refreshBtn">Refresh</button>

  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Batch</th>
        <th>Expiry</th>
        <th>Qty</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="inventoryTable"></tbody>
  </table>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://vqjoucscghcvneudywls.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxam91Y3NjZ2hjdm5ldWR5d2xzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTYzMjgsImV4cCI6MjA5MDQzMjMyOH0.lttMVg3alSreRBPkrmdLK07kKlGAu3W7MYtJypKDSLg"
);

// LOAD ITEMS
async function loadItems() {
  const { data, error } = await supabase.from("items").select("*");

  if (error) {
    console.error(error);
    return;
  }

  const inSel = document.getElementById("itemSelect");
  const outSel = document.getElementById("itemSelectOut");

  inSel.innerHTML = "";
  outSel.innerHTML = "";

  data.forEach(item => {
    let opt1 = new Option(item.item_name, item.id);
    let opt2 = new Option(item.item_name, item.id);

    inSel.add(opt1);
    outSel.add(opt2);
  });
}

// ADD ITEM
async function addItem() {
  alert("BUTTON CLICKED");

  const name = document.getElementById("itemName").value;
  const category = document.getElementById("category").value;

  console.log("INPUT:", name, category);

  const { data, error } = await supabase
    .from("items")
    .insert([
      { item_name: name, category: category }
    ])
    .select();

  console.log("RESULT:", { data, error });

  if (error) {
    alert("SUPABASE ERROR: " + error.message);
    return;
  }

  alert("ITEM ADDED SUCCESSFULLY");
  loadItems();
}

// STOCK IN
async function stockIn() {
  const itemId = document.getElementById("itemSelect").value;
  const batchNo = document.getElementById("batchNo").value;
  const expiry = document.getElementById("expiryDate").value;
  const qty = document.getElementById("qtyIn").value;

  const { data: batch, error } = await supabase
    .from("batches")
    .insert([{ item_id: itemId, batch_no: batchNo, expiry_date: expiry, quantity: 0 }])
    .select()
    .single();

  if (error) return alert(error.message);

  await supabase.from("transactions").insert([
    { batch_id: batch.id, quantity: qty, type: "IN" }
  ]);

  alert("Stock IN done");
  loadInventory();
}

// STOCK OUT
async function stockOut() {
  const itemId = document.getElementById("itemSelectOut").value;
  const qty = document.getElementById("qtyOut").value;

  const { data } = await supabase
    .from("batches")
    .select("id")
    .eq("item_id", itemId)
    .limit(1);

  if (!data.length) return alert("No stock");

  const { error } = await supabase.from("transactions").insert([
    { batch_id: data[0].id, quantity: qty, type: "OUT" }
  ]);

  if (error) return alert(error.message);

  alert("Stock OUT done");
  loadInventory();
}

// LOAD INVENTORY
async function loadInventory() {
  const { data, error } = await supabase.from("inventory_view").select("*");

  if (error) {
    console.error(error);
    return;
  }

  const table = document.getElementById("inventoryTable");
  table.innerHTML = "";

  data.forEach(row => {
    const tr = document.createElement("tr");

    if (row.status === "EXPIRED") tr.classList.add("expired");
    if (row.status === "EXPIRING SOON") tr.classList.add("soon");

    tr.innerHTML = `
      <td>${row.item_name}</td>
      <td>${row.batch_no}</td>
      <td>${row.expiry_date}</td>
      <td>${row.quantity}</td>
      <td>${row.status}</td>
    `;

    table.appendChild(tr);
  });
}

// EVENTS (NO MORE onclick)
document.getElementById("addItemBtn").addEventListener("click", addItem);
document.getElementById("stockInBtn").addEventListener("click", stockIn);
document.getElementById("stockOutBtn").addEventListener("click", stockOut);
document.getElementById("refreshBtn").addEventListener("click", loadInventory);

// INIT
loadItems();
loadInventory();
</script>

</body>
</html>
