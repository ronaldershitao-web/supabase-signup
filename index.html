<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Signup</title>
  
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- QR Code library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ...your previous CSS... */
    body { font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, #74ebd5, #ACB6E5); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
    .container { background-color:#fff; border-radius:12px; padding:30px 25px; width:100%; max-width:400px; box-shadow:0 8px 20px rgba(0,0,0,0.15); }
    h2 { text-align:center; margin-bottom:20px; color:#333; }
    input { width:100%; padding:12px 15px; margin-bottom:15px; border-radius:8px; border:1px solid #ccc; font-size:16px; transition:0.3s; }
    input:focus { border-color:#4CAF50; outline:none; box-shadow:0 0 5px rgba(76,175,80,0.5); }
    button { width:100%; padding:14px; border:none; border-radius:8px; background-color:#4CAF50; color:white; font-size:18px; cursor:pointer; transition:0.3s; }
    button:hover { background-color:#45a049; }
    p#message { margin-top:15px; text-align:center; font-weight:500; }
  </style>
</head>

<body>
  <div class="container">
    <h2>Member Signup</h2>

    <input id="name" placeholder="Full Name" required>
    <input id="email" type="email" placeholder="Email">
    <input id="phone" type="tel" placeholder="Phone">
    <input id="address" placeholder="Address">
    <input id="postal" placeholder="Postal Code">

    <button onclick="submitForm()">Submit</button>
    <p id="message"></p>
  </div>

  <script>
  const supabaseUrl = "https://vqjoucscghcvneudywls.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxam91Y3NjZ2hjdm5ldWR5d2xzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTYzMjgsImV4cCI6MjA5MDQzMjMyOH0.lttMVg3alSreRBPkrmdLK07kKlGAu3W7MYtJypKDSLg";
  const client = supabase.createClient(supabaseUrl, supabaseKey);

  async function submitForm() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;
    const postal = document.getElementById("postal").value;
    const msg = document.getElementById("message");

    // Insert member
    const { data, error } = await client
      .from("members")
      .insert([{ name, email, phone, address, postal }])
      .select();

    if (error) {
      msg.style.color = "red";
      msg.innerText = "❌ Error: " + error.message;
      return;
    }

    const memberId = data[0].id;

    // Call Edge Function (optional, for status update)
    try {
      const res = await fetch("https://vqjoucscghcvneudywls.supabase.co/functions/v1/new-member", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: memberId })
      });

      if (!res.ok) throw new Error("Edge function failed");

      msg.style.color = "green";
      msg.innerText = "✅ Signup successful! We will contact you soon.";

    } catch (e) {
      msg.style.color = "orange";
      msg.innerText = "⚠️ Signup saved, but confirmation pending.";
    }

    // Clear form
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("address").value = "";
    document.getElementById("postal").value = "";
  }
</script>
</body>
</html>
