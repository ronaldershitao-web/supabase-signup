<!DOCTYPE html>
<html>
<head>
  <title>Pastoral System</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Add Member</h2>
<input id="name" placeholder="Name">
<input id="contact" placeholder="Contact">
<button onclick="addMember()">Add Member</button>

<h2>Create Case</h2>
<input id="member_id" placeholder="Member ID">
<input id="type" placeholder="Case Type">
<input id="priority" placeholder="Priority (1-5)">
<input id="due_date" type="date">
<button onclick="createCase()">Create Case</button>

<h2>🔥 Today's Tasks</h2>
<button onclick="loadTasks()">Load Tasks</button>
<ul id="taskList"></ul>

<script>
const supabase = window.supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_ANON_KEY"
);

// ADD MEMBER
async function addMember() {
  const name = document.getElementById("name").value;
  const contact = document.getElementById("contact").value;

  const { data, error } = await supabase
    .from("members")
    .insert([{ name, contact }]);

  alert("Member added!");
}

// CREATE CASE + TASK
async function createCase() {
  const member_id = document.getElementById("member_id").value;
  const type = document.getElementById("type").value;
  const priority = parseInt(document.getElementById("priority").value);
  const due_date = document.getElementById("due_date").value;

  const { data: caseData } = await supabase
    .from("cases")
    .insert([{ member_id, type, priority }])
    .select();

  const case_id = caseData[0].id;

  await supabase.from("tasks").insert([
    {
      case_id,
      task_type: "follow-up",
      due_date
    }
  ]);

  alert("Case + Task created!");
}

// LOAD TASKS
async function loadTasks() {
  const { data } = await supabase
    .from("tasks")
    .select(`
      id,
      task_type,
      due_date,
      cases (
        priority,
        members ( name )
      )
    `)
    .eq("completed", false)
    .lte("due_date", new Date().toISOString().split('T')[0]);

  const list = document.getElementById("taskList");
  list.innerHTML = "";

  data.forEach(task => {
    const li = document.createElement("li");
    li.innerText = `${task.cases.members.name} - ${task.task_type} (Priority ${task.cases.priority})`;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
