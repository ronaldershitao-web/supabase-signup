
<!DOCTYPE html>
<html>
<head>
  <title>SAP Style Inventory</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #eef1f5;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }

    input, select, button {
      padding: 8px;
      margin: 5px;
    }

    .command-bar {
      background: black;
      padding: 10px;
      border-radius: 5px;
    }

    .command-bar input {
      width: 300px;
      background: black;
      color: lime;
      border: none;
      font-family: monospace;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px;
      text-align: center;
    }
  </style>
</head>

<body>

<h2>📦 Inventory System (SAP Style)</h2>

<!-- COMMAND BAR -->
<div class="command-bar">
  <input id="tcodeInput" placeholder="Enter T-Code (e.g. /mm01)">
  <button id="goBtn">Enter</button>
</div>

<!-- SCREENS -->

<div id="mm01" class="card">
  <h3>/MM01 - Create Material</h3>

  <h4>Basic Data</h4>
  <input id="description" placeholder="Description">
  <input id="unit" placeholder="Unit (EA/KG)">
  <select id="material_type">
    <option value="RAW">RAW</option>
    <option value="FG">FG</option>
  </select>

  <h4>Plant</h4>
  <select id="plant">
    <option value="SG01">SG01</option>
    <option value="SG02">SG02</option>
  </select>

  <h4>Inventory Control</h4>
  <label>Batch Managed</label>
  <input type="checkbox" id="batch_managed" checked>

  <label>Cycle Count Required</label>
  <input type="checkbox" id="cycle_count_required">

  <input id="reorder_point" type="number" placeholder="Reorder Point">

  <input id="shelf_life" type="number" placeholder="Shelf Life (days)">

  <button id="addItemBtn">Create Material</button>
</div>

<div id="migo" class="card" style="display:none;">
  <h3>/MIGO - Stock In</h3>
  <select id="itemSelect"></select>
  <input id="batchNo" placeholder="Batch">
  <input id="expiryDate" type="date">
  <input id="qtyIn" type="number" placeholder="Qty">
  <button id="stockInBtn">Post</button>
</div>

<div id="mb1a" class="card" style="display:none;">
  <h3>/MB1A - Stock Out</h3>
  <select id="itemSelectOut"></select>
  <input id="qtyOut" type="number" placeholder="Qty">
  <button id="stockOutBtn">Post</button>
</div>

<div id="mb52" class="card" style="display:none;">
  <h3>/MB52 - Inventory</h3>
  <button id="refreshBtn">Refresh</button>

  <table>
    <thead>
  <tr>
    <th>Item</th>
    <th>Batch</th>
    <th>Expiry</th>
    <th>Qty</th>
    <th>UoM</th>
  </tr>
</thead>
    <tbody id="inventoryTable"></tbody>
  </table>
</div>

<script>
// =====================
// SUPABASE INIT (ONLY ONCE)
// =====================
const supabaseClient = window.supabase.createClient(
  "https://vqjoucscghcvneudywls.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxam91Y3NjZ2hjdm5ldWR5d2xzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTYzMjgsImV4cCI6MjA5MDQzMjMyOH0.lttMVg3alSreRBPkrmdLK07kKlGAu3W7MYtJypKDSLg"
);

// =====================
// SCREEN CONTROL
// =====================
function showScreen(code) {
  ["mm01","migo","mb1a","mb52"].forEach(id => {
    document.getElementById(id).style.display = "none";
  });

  const screen = code.replace("/", "");
  const el = document.getElementById(screen);

  if (!el) {
    alert("Invalid T-Code");
    return;
  }

  el.style.display = "block";

  // Lazy loading
  if (screen === "migo" || screen === "mb1a") loadItems();
  if (screen === "mb52") loadInventory();
}

// =====================
// T-CODE HANDLER
// =====================
function handleTcode() {
  const input = document.getElementById("tcodeInput").value.toLowerCase();
  showScreen(input);
}

// =====================
// LOAD ITEMS
// =====================
async function loadItems() {
  const { data, error } = await supabaseClient
    .from("items")
    .select("id, material_code, description");

  if (error) return console.error(error);

  const inSel = document.getElementById("itemSelect");
  const outSel = document.getElementById("itemSelectOut");

  inSel.innerHTML = "";
  outSel.innerHTML = "";

  data.forEach(i => {
    const label = `${i.material_code} - ${i.description}`;

    inSel.add(new Option(label, i.id));
    outSel.add(new Option(label, i.id));
  });
}

// =====================
// CREATE ITEM (/MM01)
// =====================
async function addItem() {
  const data = {
    description: document.getElementById("description").value,
    unit: document.getElementById("unit").value,
    material_type: document.getElementById("material_type").value,
    plant: document.getElementById("plant").value,
    batch_managed: document.getElementById("batch_managed").checked,
    cycle_count_required: document.getElementById("cycle_count_required").checked,
    reorder_point: parseInt(document.getElementById("reorder_point").value || 0),
    shelf_life: parseInt(document.getElementById("shelf_life").value || 0)
  };

  const { error } = await supabaseClient
    .from("items")
    .insert([data]);

  if (error) return alert(error.message);

  alert("Material Created (Auto Code Generated)");
}

// =====================
// STOCK IN (/MIGO)
// =====================
async function stockIn() {
  const itemId = document.getElementById("itemSelect").value;
  const batchNo = document.getElementById("batchNo").value;
  const expiry = document.getElementById("expiryDate").value;
  const qty = parseInt(document.getElementById("qtyIn").value);

  const { error } = await supabaseClient
    .from("stock_lines")
    .insert([{
      item_id: itemId,
      batch_no: batchNo,
      expiry_date: expiry,
      stock_type: "IN",
      quantity: qty,
      uom: "EA",
      packaging_level: "BOX",
      reference: "MIGO"
    }]);

  if (error) return alert(error.message);

  alert("Goods Receipt Posted");
  loadInventory();
}

// =====================
// STOCK OUT (/MB1A)
// =====================
async function stockOut() {
  const itemId = document.getElementById("itemSelectOut").value;
  const qty = parseInt(document.getElementById("qtyOut").value);

  const { error } = await supabaseClient
    .from("stock_lines")
    .insert([{
      item_id: itemId,
      stock_type: "OUT",
      quantity: qty,
      reference: "MB1A"
    }]);

  if (error) return alert(error.message);

  alert("Goods Issue Posted");
  loadInventory();
}

// =====================
// INVENTORY (/MB52)
// =====================
async function loadInventory() {
  const { data, error } = await supabaseClient
    .from("inventory_view")
    .select("*")
    .order("material_code", { ascending: true })
    .order("batch_no", { ascending: true });

  if (error) return console.error(error);

  const table = document.getElementById("inventoryTable");
  table.innerHTML = "";

  let currentMaterial = null;

  data.forEach(r => {

    // =========================
    // MATERIAL HEADER
    // =========================
    if (currentMaterial !== r.material_code) {
      currentMaterial = r.material_code;

      const header = document.createElement("tr");
      header.innerHTML = `
        <td colspan="5" style="background:#222; color:white; font-weight:bold;">
          ${r.material_code} - ${r.description}
        </td>
      `;
      table.appendChild(header);
    }

    // =========================
    // BATCH ROW
    // =========================
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td></td>
      <td>${r.batch_no || '-'}</td>
      <td>${r.expiry_date || '-'}</td>
      <td>${r.quantity}</td>
      <td>${r.uom || 'EA'}</td>
    `;

    table.appendChild(tr);
  });
}

// =====================
// INIT (NO onclick, NO ERRORS)
// =====================
document.addEventListener("DOMContentLoaded", () => {

  document.getElementById("goBtn").addEventListener("click", handleTcode);
  document.getElementById("addItemBtn").addEventListener("click", addItem);
  document.getElementById("stockInBtn").addEventListener("click", stockIn);
  document.getElementById("stockOutBtn").addEventListener("click", stockOut);
  document.getElementById("refreshBtn").addEventListener("click", loadInventory);

  showScreen("/mm01"); // default screen

});
</script>

</body>
</html>
